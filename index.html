<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Weather App</title>
  </head>

  <body
    class="min-h-screen bg-gradient-to-br from-blue-500 via-sky-400 to-cyan-300 flex items-center justify-center p-5"
  >
    <div
      class="bg-white/20 backdrop-blur-lg border border-white/30 shadow-2xl rounded-3xl w-full max-w-md p-6 text-white"
    >
      <h1 class="text-3xl font-bold text-center mb-6">Weather App</h1>

      <div class="flex gap-3 mb-8">
        <input
          id="searchInput"
          type="text"
          placeholder="Enter city name..."
          class="flex-1 px-4 py-3 rounded-xl outline-none text-black placeholder-gray-500"
        />

        <button
          id="searchBtn"
          class="bg-white text-blue-600 font-semibold px-5 rounded-xl hover:bg-blue-100 transition"
        >
          Search
        </button>
      </div>

      <div id="weatherInfo" class="text-center hidden">
        <img
          id="weatherIcon"
          src=""
          alt="weather icon"
          class="w-24 mx-auto mb-4"
        />

        <h2 id="cityName" class="text-3xl font-bold mb-2"></h2>

        <p id="temperature" class="text-5xl font-extrabold mb-3"></p>

        <p id="condition" class="text-xl mb-6"></p>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white/20 rounded-2xl p-4 shadow-lg backdrop-blur-md">
            <p class="text-lg font-semibold">Humidity</p>
            <p id="humidity" class="text-2xl font-bold mt-1"></p>
          </div>

          <div class="bg-white/20 rounded-2xl p-4 shadow-lg backdrop-blur-md">
            <p class="text-lg font-semibold">Wind Speed</p>
            <p id="windSpeed" class="text-2xl font-bold mt-1"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
